name: calendrier_etude
description: A new Flutter project.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  syncfusion_flutter_calendar: 31.1.19
  sqflite: ^2.4.2
  path: ^1.8.0
  uuid: ^3.0.7
  sqflite_common_ffi: ^2.3.6
  pdf: ^3.6.0
  path_provider: ^2.1.4
  intl: ^0.20.2
  permission_handler: ^11.3.1
 
  flutter_localizations:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  firebase_core: ^3.9.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
